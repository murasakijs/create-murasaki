name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish create-murasaki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # npm 11.5+ has full Trusted Publisher OIDC support; force-upgrade.
      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify version matches tag (if triggered by tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Publish to npm
        run: npm publish --provenance --access public
